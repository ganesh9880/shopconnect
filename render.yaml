# Render Blueprint — Sri Lakshmi Vastralayam (ShopConnect)
# Dashboard: New → Blueprint → connect repo → apply
# Or create services manually using DEPLOY_RENDER.md

services:
  - type: web
    name: vastralayam-api
    runtime: node
    rootDir: backend
    plan: free
    # migrate runs on start (needs DATABASE_URL at runtime, not always at build)
    buildCommand: npm install --include=dev && npx prisma generate
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ADMIN_EXPIRES
        value: 8h
      - key: CUSTOMER_SESSION_DAYS
        value: 365
      - key: FRONTEND_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: vastralayam
      - key: SHOP_NAME
        value: Sri Lakshmi Vastralayam
      - key: SHOP_WHATSAPP
        sync: false
      - key: SHOP_UPI_ID
        sync: false

staticSites:
  - name: vastralayam-web
    rootDir: frontend
    # --include=dev ensures vite/tailwind install (needed at build time)
    buildCommand: npm install --include=dev && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
